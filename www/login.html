<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Robot Yocto - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet"/>
  <style>
    /* Definicion de los colores */

    :root {
      --bg:      #040507;
      --surface: #0d1219;
      --border:  #1c2c3e;
      --amber:   #ffffff;
      --cyan:    #2b93f5;
      --green:   #00e83a;
      --danger:  #ff3344;
      --text:    #ffffff;
      --text-hi: #ffffff;
      --mono: 'Share Tech Mono', monospace;
      --sans: 'Rajdhani', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      font-family: var(--mono);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Implementacion Scanline */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        to bottom, transparent 0, transparent 3px,
        rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
    }

    .card {
      position: relative;
      width: min(400px, 92vw);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 48px 36px 36px;
      animation: up .5s ease both;
    }
    @keyframes up { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }

    /* Especificar los bordes de la ventana */
    .card::before, .card::after,
    .card .c-bl, .card .c-br {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      border-color: var(--amber);
      border-style: solid;
    }
    .card::before { top:-1px;    left:-1px;  border-width: 2px 0 0 2px; }
    .card::after  { top:-1px;    right:-1px; border-width: 2px 2px 0 0; }
    .c-bl { bottom:-1px; left:-1px;  border-width: 0 0 2px 2px; }
    .c-br { bottom:-1px; right:-1px; border-width: 0 2px 2px 0; }

    /* header */
    .header { text-align: center; margin-bottom: 36px; }
    .logo {
      width: 60px; height: 60px; border-radius: 50%;
      border: 2px solid var(--amber);
      display: grid; place-items: center;
      margin: 0 auto 14px;
    }

    /* titulo, subtitulo y labels */
    .logo svg { width: 28px; height: 28px; }
    .label {
      font-family: var(--sans); font-size: 10px; font-weight: 300;
      letter-spacing: .3em; color: var(--amber); text-transform: uppercase;
      margin-bottom: 7px;
    }
    .title {
      font-family: var(--sans); font-size: 20px; font-weight: 700;
      color: var(--text-hi); letter-spacing: .06em;
    }

    .subtitle {
      font-size: 0.85rem;color: var(--text-hi);margin-top: 
      4px;letter-spacing: 0.03em;
    }

    /* Implementacion del formulario */
    .field { margin-bottom: 18px; }
    label {
      display: block; font-size: 9px; letter-spacing: .22em;
      color: var(--amber); text-transform: uppercase; margin-bottom: 7px;
    }
    input[type=text], input[type=password] {
      width: 100%;
      background: rgba(0,0,0,.4);
      border: 1px solid var(--border);
      border-bottom-color: var(--amber);
      color: var(--text-hi);
      font-family: var(--mono); font-size: 13px;
      padding: 9px 12px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 1px rgba(0,207,255,.15);
    }

    .btn {
      width: 100%; margin-top: 6px; padding: 11px;
      background: transparent; border: 1px solid var(--amber);
      color: var(--amber); font-family: var(--mono);
      font-size: 11px; letter-spacing: .25em; text-transform: uppercase;
      cursor: pointer; position: relative; overflow: hidden;
      transition: color .2s;
    }
    .btn::before {
      content: ''; position: absolute; inset: 0;
      background: var(--amber); transform: translateX(-100%);
      transition: transform .22s ease; z-index: -1;
    }
    .btn:hover { color: #07090d; }
    .btn:hover::before { transform: translateX(0); }

    .msg {
      margin-top: 14px; padding: 7px 10px;
      font-size: 10px; letter-spacing: .12em; display: none;
      border-left: 2px solid transparent;
    }
    .msg.error  { display:block; border-left-color:var(--danger); color:var(--danger); background:rgba(255,51,68,.08); }
    .msg.ok     { display:block; border-left-color:var(--green);  color:var(--green);  background:rgba(0,232,122,.08); }

    .footer {
      margin-top: 28px; padding-top: 14px; border-top: 1px solid var(--border);
      display: flex; justify-content: space-between;
      font-size: 9px; color: rgba(138,168,192,.3); letter-spacing: .12em;
    }
  /* Logo de la ventana / Estilo del formulario */
  </style>
</head>
<body>
<div class="card">
  <div class="c-bl"></div><div class="c-br"></div>
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 32 32" fill="none">
        <rect x="9" y="12" width="14" height="12" rx="2" stroke="#2b93f5" stroke-width="1.5"/>
        <circle cx="13" cy="17" r="1.5" fill="#2b93f5"/>
        <circle cx="19" cy="17" r="1.5" fill="#2b93f5"/>
        <rect x="14" y="7" width="4" height="5" rx="1" stroke="#2b93f5" stroke-width="1.5"/>
        <line x1="6"  y1="16" x2="9"  y2="16" stroke="#2b93f5" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="23" y1="16" x2="26" y2="16" stroke="#2b93f5" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="12" y1="24" x2="12" y2="27" stroke="#2b93f5" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="20" y1="24" x2="20" y2="27" stroke="#2b93f5" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <p class="subtitle">Bienvenido al Sistema de Control </p>
    <h1 class="title">ROBOT YOCTO</h1>
    <p class="label">Iniciar sesión</p>
  </div>

  <form id="form">
    <div class="field">
      <label for="u">▸ Usuario</label>
      <input id="u" type="text" placeholder="usuario" autocomplete="off" spellcheck="false"/>
    </div>
    <div class="field">
      <label for="p">▸ Contraseña</label>
      <input id="p" type="password" placeholder="contraseña"/>
    </div>
    <button type="submit" class="btn">INGRESAR</button>
    <div class="msg" id="msg"></div>
  </form>

  <div class="footer">
    <span></span>
    <span id="clock"></span>
    <span></span>
  </div>
</div>

<script>
  /* Implementacion del Reloj */
  (function tick() {
    document.getElementById('clock').textContent =
      new Date().toTimeString().slice(0, 8);
    setTimeout(tick, 1000);
  })();

  /* Funcionalidad del Login */
  document.getElementById('form').addEventListener('submit', async e => {
    e.preventDefault();
    const msg  = document.getElementById('msg');
    const user = document.getElementById('u').value.trim();
    const pass = document.getElementById('p').value;
    msg.className = 'msg';

    if (!user || !pass) {
      msg.className = 'msg error';
      msg.textContent = 'Ingrese usuario y contraseña.';
      return;
    }

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: user, password: pass })
      });
      if (res.ok) {
        msg.className = 'msg ok';
        msg.textContent = 'Acceso concedido. Redirigiendo…';
    /* Redireccionar a la ventana del dashboard */
        /* window.location.href = '/dashboard'; */
      } else {
        const d = await res.json().catch(() => ({}));
        msg.className = 'msg error';
        msg.textContent = '' + (d.error || 'Error de autenticación.');
      }
    } catch (_) {
      msg.className = 'msg error';
      msg.textContent = 'No se pudo conectar con el servidor [Servidor Desconectado].';
    }
  });
</script>
</body>
</html>
